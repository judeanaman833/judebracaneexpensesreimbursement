{% extends 'base.html' %}

{% block content %}
<div class="max-w-lg mx-auto mt-16 px-4 text-gray-900 dark:text-gray-100">

  <div class="bg-white dark:bg-gray-800 px-6 py-4 rounded-xl shadow-md ring-1 ring-gray-200 dark:ring-gray-700 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 mb-6">
    <h2 class="text-3xl font-bold tracking-tight text-gray-900 dark:text-white">
      Delete Expense
    </h2>
    <a href="{% url 'expense-list' %}" 
       class="px-4 py-2 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-900 dark:text-gray-100 rounded-lg font-medium transition">
      Back to List
    </a>
  </div>

  <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-md ring-1 ring-gray-200 dark:ring-gray-700 text-center">
    <p class="text-lg text-gray-800 dark:text-gray-200 mb-6">
      Are you sure you want to delete this expense? <br>
      This action <span class="font-semibold text-red-600 dark:text-red-400">cannot be undone</span>.
    </p>

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <button type="submit" 
              class="w-full py-3 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition">
        Yes, Delete Expense
      </button>
      <a href="{% url 'expense-list' %}" 
         class="block w-full text-center py-3 bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-900 dark:text-gray-100 rounded-lg transition font-medium">
        Cancel
      </a>
    </form>
  </div>

</div>
{% endblock %}
